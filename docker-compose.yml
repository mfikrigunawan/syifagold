services:
  syifagold:
    container_name: syifagold-dev

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"

    command: npm run dev
